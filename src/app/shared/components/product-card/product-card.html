<div class="card"  [routerLink]="['/product', product().id]" style="cursor: pointer;">
      <h3>{{ product().name }}</h3>
      <p>{{ product().description }}</p>
      <div class="footer">
            <small>{{ product().publicationDate | date:'shortDate' }}</small>
      </div>
      <button (click)="onClaim()">¡Lo quiero!</button>
    </div>
